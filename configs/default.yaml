# ── Dataset ────────────────────────────────────────────────────────────────────
dataset:
  name: mnist
  data_dir: ./data
  image_size: 28
  num_classes: 10
  num_workers: 4
  pin_memory: true

# ── Model ──────────────────────────────────────────────────────────────────────
model:
  architecture: small_vit   # options: small_vit | baseline_cnn
  in_channels: 1            # MNIST is grayscale
  num_classes: 10
  # ViT-specific
  image_size: 28
  patch_size: 7             # 28/7 = 4x4 = 16 patches
  dim: 128                  # embedding dimension
  depth: 4                  # number of transformer layers
  heads: 4                  # number of attention heads
  mlp_dim: 256              # feed-forward hidden size
  dropout: 0.1
  emb_dropout: 0.1

# ── Training ───────────────────────────────────────────────────────────────────
training:
  epochs: 20
  batch_size: 128
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  optimizer: adamw          # options: adamw | sgd
  scheduler: cosine         # options: cosine | step | none
  warmup_epochs: 2
  label_smoothing: 0.1
  grad_clip: 1.0
  seed: 42

# ── Paths ──────────────────────────────────────────────────────────────────────
paths:
  output_dir: ./outputs
  checkpoint_name: best_model.pth
  log_file: ./outputs/train.log

# ── Export ─────────────────────────────────────────────────────────────────────
export:
  onnx_filename: model.onnx
  torchscript_filename: model_torchscript.pt
  opset_version: 17
