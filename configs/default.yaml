# ── Dataset ──────────────────────────────────────────────────────────────────
dataset:
  name: mnist
  data_dir: data/mnist
  image_size: 28          # Native MNIST resolution; ViT will resize internally
  num_classes: 10
  num_workers: 4
  pin_memory: true

# ── Model ────────────────────────────────────────────────────────────────────
model:
  name: vit_tiny          # Options: vit_tiny | cnn_baseline
  # ViT-Tiny hyper-params
  patch_size: 4           # 28/4 = 7×7 = 49 patches
  dim: 192
  depth: 6
  num_heads: 3
  mlp_dim: 384
  dropout: 0.1
  # Shared
  in_channels: 1          # MNIST is greyscale
  num_classes: 10

# ── Training ─────────────────────────────────────────────────────────────────
training:
  epochs: 20
  batch_size: 256
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  label_smoothing: 0.1
  warmup_epochs: 2
  seed: 42
  val_split: 0.1          # Fraction of training set used for validation

# ── Outputs ──────────────────────────────────────────────────────────────────
outputs:
  dir: outputs
  best_model: outputs/best_model.pt
  last_model: outputs/last_model.pt
  onnx_model: outputs/model.onnx
  torchscript_model: outputs/model_torchscript.pt
  confusion_matrix: outputs/confusion_matrix.png
